version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

      - name: email
        tests: 
          - not_null

      - name: kyc_status
        tests: 
          - accepted_values:
              values: ['verified','pending','rejected']

  - name: stg_transactions
    columns:
      - name: transaction_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: amount
        tests:
        - not_null

 